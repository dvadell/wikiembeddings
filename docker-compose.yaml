# Local development with docker-compose — PRD §8.1
# Start:  docker compose up
# Health: curl http://localhost:8000/health
# Search: curl "http://localhost:8000/search?q=photosynthesis&k=5"

services:
  wiki-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/dvadell/wiki-search:latest
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    environment:
      # overridden by dotenv (above); left as fallback values
      MODEL_NAME: ${MODEL_NAME}
      EMBED_DIM: ${EMBED_DIM}
      FAISS_INDEX: ${FAISS_INDEX}
      TITLES_FILE: ${TITLES_FILE}
      DEFAULT_K: ${DEFAULT_K}
      DEFAULT_NPROBE: ${DEFAULT_NPROBE}
      PORT: ${PORT}
      WORKERS: ${WORKERS}
    volumes:
      # Mount data files so dev can swap dumps without rebuilding the image.
      - ./wiki_faiss.index:/app/wiki_faiss.index
      - ./wiki_titles.txt:/app/wiki_titles.txt
    restart: unless-stopped
