# ── Release: test → build → push to GHCR ──────────────────────────────
# Triggers only when a GitHub release is *published* (not draft-created or editted).
# Reuses T4's coverage gate; pushes to GHCR behind environment protection.

name: release

on:
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE: wiki-search

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Test gate — reuses T4 coverage requirements before any publish
  # ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          rm -rf .venv
          uv venv
          uv pip install -e ".[dev]"
        shell: bash

      - name: Run tests with coverage (≥ 95 %)
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=95 tests/

      - name: Run ruff linter
        run: uv run ruff check app/ tests/

  # ────────────────────────────────────────────────────────────────────
  # Build & push — gated by the test job, protected by the "production"
  # GitHub Environment (requires manual approval).
  # ────────────────────────────────────────────────────────────────────
  build-push:
    needs: [test]          # only runs after tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: production  # → environment protection rule (required reviewers)
    steps:
      - uses: actions/checkout@v4

      # ── log in to GHCR ────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── derive image tags from the release ref ────────────────────
      - name: Extract version for tagging
        id: tags
        run: |
          TAGS=""
          # Always tag with the exact ref (e.g. v1.0.0 → ghcr.io/…:v1.0.0)
          TAGS="${TAGS}${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ github.ref_name }}"

          # Also add a major-version tag when the ref matches vN.* (e.g. v1 → latest)
          MAJOR=$(echo "${{ github.ref_name }}" | sed -n 's/^v\([0-9]\+\)\..*/\1/p')
          if [ -n "$MAJOR" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE }}:${MAJOR}"
            # On the first major version (v1), also tag as latest
            if [ "$MAJOR" = "1" ]; then
              TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE }}:latest"
            fi
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # ── build & push ──────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
